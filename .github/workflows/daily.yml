name: Dagelijkse Playlist Update

on:
  schedule:
    # Elke dag om 06:00 Belgische tijd (= 05:00 UTC zomer / 06:00 UTC winter)
    # Zo staat de playlist klaar als je je dag begint
    - cron: "0 5 * * *"

  # Handmatig triggeren via GitHub UI (handig om te testen)
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Tidal sessie herstellen
        env:
          TIDAL_SESSION_JSON: ${{ secrets.TIDAL_SESSION_JSON }}
        run: python -c "import os, pathlib; pathlib.Path('/tmp/tidal_session.json').write_text(os.environ['TIDAL_SESSION_JSON'])"

      - name: Playlist updaten
        env:
          TIDAL_PLAYLIST_ID:    ${{ secrets.TIDAL_PLAYLIST_ID }}
          LASTFM_API_KEY:       ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET:    ${{ secrets.LASTFM_API_SECRET }}
          LASTFM_USERNAME:      ${{ secrets.LASTFM_USERNAME }}
          LASTFM_PASSWORD:      ${{ secrets.LASTFM_PASSWORD }}
        run: python main.py
