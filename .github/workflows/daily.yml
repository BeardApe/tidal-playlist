name: Dagelijkse Tidal Playlist Update

on:
  schedule:
    - cron: "0 5 * * *"   # elke dag om 05:00 UTC
  workflow_dispatch:        # ook handmatig te starten

permissions:
  contents: write           # nodig om state.json terug te committen

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Afhankelijkheden installeren
        run: pip install -r requirements.txt

      - name: Tidal sessie herstellen
        env:
          TIDAL_SESSION_JSON: ${{ secrets.TIDAL_SESSION_JSON }}
        run: python normalize_session.py

      - name: Playlist updaten
        env:
          TIDAL_PLAYLIST_ID:     ${{ secrets.TIDAL_PLAYLIST_ID }}
          LASTFM_API_KEY:        ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET:     ${{ secrets.LASTFM_API_SECRET }}
          LASTFM_USERNAME:       ${{ secrets.LASTFM_USERNAME }}
          LASTFM_PASSWORD:       ${{ secrets.LASTFM_PASSWORD }}
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python main.py

      - name: State.json opslaan in repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
