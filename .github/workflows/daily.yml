name: Dagelijkse Playlist Update

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Tidal sessie herstellen en normaliseren
        env:
          TIDAL_SESSION_JSON: ${{ secrets.TIDAL_SESSION_JSON }}
        run: python normalize_session.py

      - name: Playlist updaten
        env:
          TIDAL_PLAYLIST_ID:    ${{ secrets.TIDAL_PLAYLIST_ID }}
          LASTFM_API_KEY:       ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET:    ${{ secrets.LASTFM_API_SECRET }}
          LASTFM_USERNAME:      ${{ secrets.LASTFM_USERNAME }}
          LASTFM_PASSWORD:      ${{ secrets.LASTFM_PASSWORD }}
        run: python main.py
