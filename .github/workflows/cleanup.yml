name: Genre Cleanup (eenmalig)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Afhankelijkheden installeren
        run: pip install -r requirements.txt

      - name: Tidal sessie herstellen
        env:
          TIDAL_SESSION_JSON: ${{ secrets.TIDAL_SESSION_JSON }}
        run: python normalize_session.py

      - name: Genre-cleanup uitvoeren
        env:
          TIDAL_PLAYLIST_ID:     ${{ secrets.TIDAL_PLAYLIST_ID }}
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          LASTFM_PASSWORD:       ${{ secrets.LASTFM_PASSWORD }}
        run: python cleanup.py

      - name: State.json opslaan
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: genre cleanup state [skip ci]"
          git push
